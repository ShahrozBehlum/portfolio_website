    * {

      padding: 0;
      box-sizing: border-box;

    html {

    body {

      overflow-x: hidden;
      background: #03050b;
      color: #f0f0f0;
    }

    .starry-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 30% 20%, #0a0f1e, #02040c);
      overflow: hidden;
    }

    .star {
      position: absolute;
      background-color: #ffffff;
      border-radius: 50%;
      opacity: 0;
      animation: starTwinkle 1.6s infinite alternate ease-in-out;
      pointer-events: none;
      box-shadow: 0 0 4px rgba(255, 255, 220, 0.9);
    }

    @keyframes starTwinkle {
      0% {
        opacity: 0.15;
        transform: scale(0.7);
      }

      100% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    /* Animated Border Frame for Profile Picture */
    .animated-border-frame {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #1e1a3a, #0d0b1f);
    }

    .rotating-border {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #a855f7, #e879f9, #c084fc, #a78bfa, #a855f7);
      animation: spinElectron 3s linear infinite;
    }

    .rotating-border::before {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: #0d0b1f;
    }

    .inner-profile {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      overflow: hidden;

    .profile-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    @keyframes spinElectron {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

      width: 320px;
      height: 320px;
      animation: rotateGiantOrbit 14s linear infinite;
      margin: 0 auto;

      width: 100%;
      height: 100%;

      border-radius: 50%;
      top: 0;
      left: 0;
      box-shadow: 0 0 25px rgba(139, 92, 246, 0.4);

      position: absolute;
      width: 32px;
      height: 32px;
      background: radial-gradient(circle, #d8b4fe, #7c3aed);
      border-radius: 50%;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 25px #c084fc;
    }

    .electron-particle2 {
      position: absolute;
      width: 24px;
      height: 24px;
      background: radial-gradient(circle, #c084fc, #9333ea);
      border-radius: 50%;
      bottom: -12px;
      left: 20%;
      transform: translateX(-50%);
      box-shadow: 0 0 20px #a855f7;

    .electron-particle3 {
      position: absolute;
      width: 26px;
      height: 26px;
      background: radial-gradient(circle, #a78bfa, #7e22ce);
      border-radius: 50%;
      top: 35%;
      right: -13px;
      box-shadow: 0 0 20px #a855f7;
    }

    @keyframes rotateGiantOrbit {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .active-nav-item {
      color: #c084fc !important;
      font-weight: 800 !important;
    }

    .active-underline {
      width: 100% !important;
      background: linear-gradient(90deg, #a855f7, #e879f9);

      backdrop-filter: blur(8px);
      border: 1px solid rgba(139, 92, 246, 0.3);
      transition: all 0.3s;
    }

      border: 1px solid rgba(255, 255, 255, 0.05);

      color: transparent;

      right: 25px;
      background: #7c3aed;
      width: 52px;
      height: 52px;
      border-radius: 50%;

      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.6);
      transition: all 0.3s;

      transform: scale(1.1);
      background: #a855f7;

        height: 250px;
